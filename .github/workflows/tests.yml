name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (scoring deps only; PySide6 GUI tests importorskip)
        run: |
          python -m pip install --upgrade pip
          pip install numpy "pandas>=2.2,<3" scipy matplotlib tifffile pytest
      - name: Run scoring + adapter tests
        run: pytest -q
